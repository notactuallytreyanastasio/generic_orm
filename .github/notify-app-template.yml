name: Test and update app vendor

on:
  push:
    branches: [main]

env:
  LANG: __LANG__

permissions:
  contents: read

jobs:
  test-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lib repo
        uses: actions/checkout@v4

      # --- Language-specific setup ---

      - name: Setup Node.js
        if: env.LANG == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        if: env.LANG == 'py'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup JDK 21
        if: env.LANG == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        if: env.LANG == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Lua
        if: env.LANG == 'lua'
        run: |
          sudo apt-get update && sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install luaunit

      - name: Setup .NET
        if: env.LANG == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # --- Install dependencies ---

      - name: Install deps (JS)
        if: env.LANG == 'js'
        run: cd orm && npm install

      - name: Install deps (Python)
        if: env.LANG == 'py'
        run: pip install -e ./temper-core -e ./std -e ./orm

      - name: Install deps (Java)
        if: env.LANG == 'java'
        run: |
          cd orm
          mvn dependency:resolve -q

      # Rust, Lua, C# handle deps as part of the test command

      # --- Run tests ---

      - name: Run tests (JS)
        if: env.LANG == 'js'
        id: test-js
        run: cd orm && npm test 2>&1 | tee /tmp/test-output.txt

      - name: Run tests (Python)
        if: env.LANG == 'py'
        id: test-py
        run: cd orm && python -m pytest tests/ -v 2>&1 | tee /tmp/test-output.txt

      - name: Run tests (Java)
        if: env.LANG == 'java'
        id: test-java
        run: cd orm && mvn test 2>&1 | tee /tmp/test-output.txt

      - name: Run tests (Rust)
        if: env.LANG == 'rust'
        id: test-rust
        run: cd orm && cargo test 2>&1 | tee /tmp/test-output.txt

      - name: Run tests (Lua)
        if: env.LANG == 'lua'
        id: test-lua
        run: cd orm && lua tests/src-test.lua 2>&1 | tee /tmp/test-output.txt

      - name: Run tests (C#)
        if: env.LANG == 'csharp'
        id: test-csharp
        run: cd orm/tests && dotnet test --verbosity normal 2>&1 | tee /tmp/test-output.txt

      # --- On failure: open issue on alloy (top-level repo) ---

      - name: Open issue on alloy if tests failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.ALLOY_ISSUES_TOKEN }}
        run: |
          LANG="${{ env.LANG }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"
          TEST_OUTPUT=$(tail -80 /tmp/test-output.txt 2>/dev/null || echo "No test output captured")

          # Check for existing open issue
          EXISTING=$(gh issue list -R notactuallytreyanastasio/alloy --state open \
            --search "${LANG} backend runtime tests failed" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Commenting on existing issue #${EXISTING}"
            gh issue comment "$EXISTING" -R notactuallytreyanastasio/alloy --body "$(cat <<COMMENT_EOF
          **Still failing** on [${REPO}@${SHORT_SHA}](${RUN_URL})

          \`\`\`
          ${TEST_OUTPUT}
          \`\`\`
          COMMENT_EOF
          )"
            exit 0
          fi

          # Ensure labels exist
          gh label create "bug" -R notactuallytreyanastasio/alloy --color "d73a4a" --description "Something isn't working" 2>/dev/null || true
          gh label create "ci" -R notactuallytreyanastasio/alloy --color "0e8a16" --description "CI/CD related" 2>/dev/null || true
          gh label create "runtime" -R notactuallytreyanastasio/alloy --color "c5def5" --description "Runtime-specific test failure" 2>/dev/null || true

          cat > /tmp/issue-body.md <<EOF
          ## Runtime Test Failure

          Tests that passed via \`temper test\` at build time are **failing** when run natively in the ${LANG} runtime.

          **Child repo:** [${REPO}](https://github.com/${REPO})
          **Commit:** [${SHORT_SHA}](${RUN_URL})
          **Workflow Run:** [View logs](${RUN_URL})

          ### Test Output (last 80 lines)
          \`\`\`
          ${TEST_OUTPUT}
          \`\`\`

          ### Reproduce Locally
          \`\`\`bash
          # From the alloy repo
          cd temper.out/${LANG}/orm
          # Then run the ${LANG}-specific test command
          \`\`\`

          ### Why this matters
          The Temper compiler generated code that passes \`temper test -b ${LANG}\` but fails under the native ${LANG} test runner. This likely indicates a codegen bug in the Temper compiler's ${LANG} backend.
          EOF

          gh issue create -R notactuallytreyanastasio/alloy \
            --title "CI: ${LANG} backend runtime tests failed" \
            --body-file /tmp/issue-body.md \
            --label "bug,ci,runtime"

      # --- On success: push to app repo ---

      - name: Set up SSH
        if: success()
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY_APP }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

      - name: Update app repo vendor
        if: success()
        run: |
          git clone git@github.com:notactuallytreyanastasio/__APP_REPO__.git app-repo
          cd app-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Remove old vendor content
          rm -rf __VENDOR_PATH__/orm __VENDOR_PATH__/std __VENDOR_PATH__/temper-core
          mkdir -p __VENDOR_PATH__

          # Copy new ORM output from lib repo
          cp -r ../orm __VENDOR_PATH__/orm
          cp -r ../std __VENDOR_PATH__/std
          cp -r ../temper-core __VENDOR_PATH__/temper-core

          # Commit and push
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ORM vendor from ${GITHUB_SHA}"
            git push
          fi
