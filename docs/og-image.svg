<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Light metallic background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="35%" stop-color="#f0f1f3"/>
      <stop offset="65%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#e0e2e6"/>
    </linearGradient>
    <!-- Subtle metallic sheen -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4d7dc" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4d7dc" stop-opacity="0"/>
    </linearGradient>
    <!-- Accent gradient for the bar -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- Hex pattern for subtle texture -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 15 L60 45 L30 60 L0 45 L0 15 Z" fill="none" stroke="#c8ccd2" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#sheen)"/>

  <!-- Top accent bar -->
  <rect y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Left decorative element - stylized metal ingot/alloy bars -->
  <g transform="translate(80, 200)" opacity="0.08">
    <rect x="0" y="0" width="120" height="30" rx="2" fill="#475569" transform="rotate(-12)"/>
    <rect x="10" y="40" width="100" height="30" rx="2" fill="#475569" transform="rotate(-12)"/>
    <rect x="20" y="80" width="80" height="30" rx="2" fill="#475569" transform="rotate(-12)"/>
  </g>

  <!-- Right decorative element -->
  <g transform="translate(1000, 350)" opacity="0.08">
    <rect x="0" y="0" width="120" height="30" rx="2" fill="#475569" transform="rotate(12)"/>
    <rect x="10" y="40" width="100" height="30" rx="2" fill="#475569" transform="rotate(12)"/>
    <rect x="20" y="80" width="80" height="30" rx="2" fill="#475569" transform="rotate(12)"/>
  </g>

  <!-- Main content -->
  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#1e293b" letter-spacing="-3">Alloy</text>

  <!-- Divider line -->
  <line x1="500" y1="240" x2="700" y2="240" stroke="#94a3b8" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#64748b" letter-spacing="1">Write Once, Secure SQL Everywhere</text>

  <!-- Description -->
  <text x="600" y="345" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#94a3b8">A SQL ORM written once in Temper, compiled to six languages</text>

  <!-- Language pills -->
  <g transform="translate(600, 400)" text-anchor="middle">
    <!-- Total width: 433 (pills) + 75 (5 gaps * 15) = 508. Centered: start at -254 -->
    <!-- JS -->
    <rect x="-254" y="-18" width="100" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="-204" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">JavaScript</text>
    <!-- Python -->
    <rect x="-139" y="-18" width="85" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="-96" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">Python</text>
    <!-- Rust -->
    <rect x="-39" y="-18" width="68" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="-5" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">Rust</text>
    <!-- Java -->
    <rect x="44" y="-18" width="68" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="78" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">Java</text>
    <!-- Lua -->
    <rect x="127" y="-18" width="60" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="157" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">Lua</text>
    <!-- C# -->
    <rect x="202" y="-18" width="52" height="36" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="228" y="7" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5" text-anchor="middle">C#</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(600, 500)" text-anchor="middle">
    <text x="0" y="0" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#1e293b">6</text>
    <text x="0" y="25" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1.5">LANGUAGES</text>
  </g>

  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="url(#accent)"/>

  <!-- Temper credit -->
  <text x="600" y="590" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#b0b8c4" letter-spacing="0.5">Built with Temper</text>
</svg>
